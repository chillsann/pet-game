<!DOCTYPE html>
<html lang="zh-CN">

    <title>PET 全能冒险岛</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Comic Sans MS', '幼圆', sans-serif;
            background: linear-gradient(135deg, #a18cd1, #fbc2eb);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        .game-container {
            width: 100%;
            max-width: 720px;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35);
            text-align: center;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: white;
            font-weight: bold;
            font-size: 1.05rem;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 50px;
            padding: 8px 20px;
        }
        .lives {
            color: #ffd700;
            font-size: 1.4rem;
        }
        .score {
            background: #f39c12;
            padding: 5px 15px;
            border-radius: 20px;
            color: white;
        }
        .stars {
            color: #f1c40f;
            font-size: 1.3rem;
        }
        .progress-bar {
            width: 100%;
            height: 12px;
            background: #ddd;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #2ecc71;
            border-radius: 10px;
            transition: width 0.4s;
        }
        .timer {
            font-size: 1.8rem;
            font-weight: bold;
            color: #e74c3c;
            margin: 10px 0;
        }
        .dino {
            font-size: 4rem;
        }
        .question-area {
            background: #fef9e7;
            border-radius: 25px;
            padding: 20px;
            margin: 10px 0;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .question-text {
            font-size: 1.45rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 8px;
            line-height: 1.5;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }
        .option-btn {
            background: #f9f9f9;
            border: 3px solid #bdc3c7;
            border-radius: 20px;
            padding: 18px 10px;
            font-size: 1.05rem;
            font-weight: bold;
            color: #2c3e50;
            cursor: pointer;
            transition: 0.15s;
            word-break: break-word;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .option-btn:hover {
            transform: translateY(-3px);
            border-color: #8e44ad;
            background: #f3e5f5;
        }
        .option-btn.correct {
            background: #2ecc71;
            border-color: #27ae60;
            color: white;
        }
        .option-btn.wrong {
            background: #e74c3c;
            border-color: #c0392b;
            color: white;
        }
        .option-btn:disabled {
            pointer-events: none;
            opacity: 0.8;
        }
        .feedback-msg {
            font-size: 0.95rem;
            font-weight: bold;
            margin-top: 10px;
            min-height: 30px;
            white-space: pre-wrap;
            color: #2c3e50;
            line-height: 1.6;
            padding: 8px;
            border-radius: 12px;
        }
        .feedback-msg.explain {
            background: #eaf6ff;
            border: 2px solid #8e44ad;
            text-align: left;
        }
        .btn {
            background: #8e44ad;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin: 5px;
            box-shadow: 0 5px 0 #6c3483;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #6c3483;
        }
        .start-btn {
            background: #e67e22;
            box-shadow: 0 5px 0 #b85c0c;
            font-size: 1.5rem;
        }
        .world-card {
            background: #fff3cd;
            border-radius: 25px;
            padding: 15px;
            margin: 10px;
            cursor: pointer;
            transition: 0.2s;
            border: 3px solid #f39c12;
            font-weight: bold;
            display: inline-block;
            width: 28%;
            min-width: 100px;
        }
        .world-card:hover {
            background: #ffeaa7;
            transform: scale(1.04);
        }
        .world-icon {
            font-size: 2.5rem;
        }
        .certificate {
            background: #fef9e7;
            border: 8px double #f1c40f;
            border-radius: 30px;
            padding: 20px;
            margin: 15px 0;
        }
        .daily-progress {
            font-size: 2rem;
            margin: 15px 0;
        }
        .goal-select {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .goal-btn {
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 18px;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .review-item {
            background: #fff3cd;
            border-radius: 15px;
            padding: 12px;
            margin: 8px 0;
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .review-q {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 4px;
        }
        .review-wrong {
            color: #e74c3c;
        }
        .review-correct {
            color: #27ae60;
        }
        .review-explain {
            color: #2c3e50;
            margin-top: 4px;
            font-size: 0.9rem;
        }
        .review-scroll {
            max-height: 50vh;
            overflow-y: auto;
            text-align: left;
            padding: 5px;
        }
        .review-label {
            background: #e74c3c;
            color: white;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 0.85rem;
        }
        @media (max-width: 500px) {
            .options {
                grid-template-columns: 1fr;
            }
            .world-card {
                width: 80%;
            }
            .question-text {
                font-size: 1.25rem;
            }
            .option-btn {
                padding: 14px 10px;
                font-size: 0.95rem;
            }
        }

            // ===== 音频系统 =====
            let _audioCtx = null;
            let _ttsAudio = null;
            let _speechKeepAlive = null;

            function getAudioCtx() {
                if (!_audioCtx) {
                    _audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (_audioCtx.state === 'suspended') _audioCtx.resume();
                return _audioCtx;
            }

            function playSound(type) {
                try {
                    const ctx = getAudioCtx();
                    if (ctx.state === 'suspended') return;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    gain.gain.setValueAtTime(0.4, ctx.currentTime);
                    if (type === 'correct') {
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(523, ctx.currentTime);
                        osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
                        osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                        osc.start(ctx.currentTime);
                        osc.stop(ctx.currentTime + 0.4);
                    } else if (type === 'wrong') {
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(200, ctx.currentTime);
                        osc.frequency.linearRampToValueAtTime(150, ctx.currentTime + 0.3);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
                        osc.start(ctx.currentTime);
                        osc.stop(ctx.currentTime + 0.35);
                    }
                } catch (e) {}
            }

            function getTTSUrl(text) {
                return 'https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(text) + '&type=2';
            }

            function cleanTTSText(text) {
                return text.replace(/\[name\]/g, 'Tom').replace(/[\[\]]/g, '').trim();
            }

            function speakNow(text) {
                if (!text) return;
                text = cleanTTSText(text);
                try {
                    if (!_ttsAudio) {
                        _ttsAudio = new Audio();
                        _ttsAudio.preload = 'auto';
                    }
                    _ttsAudio.pause();
                    _ttsAudio.src = getTTSUrl(text);
                    const fallbackTimer = setTimeout(() => { speakNowFallback(text); }, 2000);
                    _ttsAudio.onplay = () => { clearTimeout(fallbackTimer); };
                    _ttsAudio.onerror = () => { clearTimeout(fallbackTimer);
                        speakNowFallback(text); };
                    _ttsAudio.play().catch(() => { clearTimeout(fallbackTimer);
                        speakNowFallback(text); });
                } catch (e) { speakNowFallback(text); }
            }

            function speakNowFallback(text) {
                if (!('speechSynthesis' in window)) return;
                const synth = window.speechSynthesis;
                clearInterval(_speechKeepAlive);
                synth.cancel();
                setTimeout(() => {
                    try { getAudioCtx(); } catch (e) {}
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'en-US';
                    u.rate = 0.85;
                    u.volume = 1.0;
                    _speechKeepAlive = setInterval(() => {
                        if (synth.speaking) synth.resume();
                        else clearInterval(_speechKeepAlive);
                    }, 300);
                    u.onend = () => clearInterval(_speechKeepAlive);
                    u.onerror = () => clearInterval(_speechKeepAlive);
                    synth.speak(u);
                }, 100);
            }

            function unlockAll() { try { getAudioCtx(); } catch (e) {} }
            ['touchstart', 'touchend', 'click', 'pointerdown'].forEach(evt => {

                    const newItem = { ...src, options: newOpts };

            const REVIEW_INTERVALS = [0, 86400000, 172800000, 345600000, 604800000, 1296000000];

            function getNextReviewTime(level) { if (level >= 6) return 0; return Date.now() + REVIEW_INTERVALS[level]; }

                const plan = getVocabPlan();
                const entry = plan[word] || { level: 0, reviews: [], nextReview: 0 };
                if (correct) entry.level = Math.min(entry.level + 1, 6);
                else entry.level = Math.max(entry.level - 1, 1);
                entry.reviews.push(Date.now());
                entry.nextReview = getNextReviewTime(entry.level);
                if (entry.level >= 6) entry.nextReview = 0;
                plan[word] = entry;
                setVocabPlan(plan);
            }

            function getDueVocabWords(count) {
                const plan = getVocabPlan();
                const now = Date.now();
                let dueWords = [];
                for (const w of ALL_WORDS) { const entry = plan[w]; if (entry && entry.level < 6 && entry.nextReview <=
                        now) dueWords.push(w); }
                let newWords = ALL_WORDS.filter(w => !plan[w]);
                dueWords = dueWords.sort(() => Math.random() - 0.5);
                newWords = newWords.sort(() => Math.random() - 0.5);
                const result = [...dueWords];
                while (result.length < count && newWords.length > 0) result.push(newWords.shift());
                if (result.length < count) {
                    let mastered = ALL_WORDS.filter(w => { const entry = plan[w]; return entry && entry.level >= 6; }).sort(

                    while (result.length < count && mastered.length > 0) result.push(mastered.shift());
                }
                return result.slice(0, count);
            }

            function getDailyAllocation(target) {
                const vocabCount = Math.max(1, Math.round(target * 0.6));
                const grammarCount = Math.max(1, Math.round(target * 0.2));
                const speakingCount = Math.max(1, target - vocabCount - grammarCount);
                return { vocabCount, grammarCount, speakingCount };
            }

            function getTodayStr() { return new Date().toISOString().slice(0, 10); }

            function getDailyTarget() { return parseInt(localStorage.getItem(STORAGE_KEY_TARGET)) || 0; }

            function setDailyTarget(n) { localStorage.setItem(STORAGE_KEY_TARGET, n); }

            function getDailyProgress() { const data = JSON.parse(localStorage.getItem(STORAGE_KEY_PROGRESS) || '{}'); return data[
                    getTodayStr()
                ] || 0; }

            function setDailyProgress(n) { const data = JSON.parse(localStorage.getItem(STORAGE_KEY_PROGRESS) || '{}');
                data[getTodayStr()] = n;
                localStorage.setItem(STORAGE_KEY_PROGRESS, JSON.stringify(data)); }

            function getStreak() { return parseInt(localStorage.getItem(STORAGE_KEY_STREAK)) || 0; }

            function setStreak(n) { localStorage.setItem(STORAGE_KEY_STREAK, n); }

            function getExplanation(q, wrongIdx) {
                const correctAnswer = q.options[q.correct];
                const wrongAnswer = (wrongIdx !== undefined && wrongIdx >= 0) ? q.options[wrongIdx] : null;
                if (q.type === 'vocab') {
                    let msg = `正确答案是"${correctAnswer}"。"${q.english}"的意思是"${correctAnswer}"`;
                    if (wrongAnswer) msg += `，不是"${wrongAnswer}"`;
                    return msg + '。';
                }
                if (q.type === 'grammar') {
                    let msg = `正确答案是"${correctAnswer}"。`;
                    if (wrongAnswer) msg += `你选的"${wrongAnswer}"是错的，`;
                    if (q.explanation) msg += `📖 ${q.explanation}`;
                    else msg += '请记住这个语法点。';
                    return msg;
                }
                if (q.type === 'speaking') {
                    let msg = `正确答案是"${correctAnswer}"。`;
                    if (wrongAnswer) msg += `"${wrongAnswer}"不是地道的表达，`;
                    if (q.explanation) msg += `💬 ${q.explanation}`;
                    else msg += '这是日常交际用语的正确表达方式。';
                    return msg;
                }
                return `正确答案是"${correctAnswer}"。`;
            }

            function getQuestionDisplay(q) {
                if (q.type === 'vocab') return `"${q.english}" 的中文意思是？`;
                if (q.type === 'grammar') return q.question || '（题目缺失）';
                return q.scenario;
            }

            function generateVocabQuestions(count) {
                const shuffled = [...ALL_WORDS].sort(() => Math.random() - 0.5).slice(0, count);
                return shuffled.map(word => {
                    const correctCN = WORD_MEANING[word] || `(${word})`;
                    const distractors = [];
                    const others = Object.keys(WORD_MEANING).filter(w => w !== word);
                    while (distractors.length < 3) {
                        const r = others[Math.floor(Math.random() * others.length)];
                        const m = WORD_MEANING[r];
                        if (m && !distractors.includes(m) && m !== correctCN) distractors.push(m);
                    }
                    const options = shuffleArray([correctCN, ...distractors]);
                    return { type: 'vocab', english: word, options, correct: options.indexOf(correctCN) };
                });
            }

            function generateGrammarQuestions(count) { return [...GRAMMAR_QUESTIONS].sort(() => Math.random() - 0.5).slice(0,
                    count); }

            function generateSpeakingQuestions(count) { return [...SPEAKING_QUESTIONS].sort(() => Math.random() - 0.5).slice(0,
                    count); }

            const container = document.getElementById('gameContainer');

            function render() {
                switch (state.screen) {
                    case 'start':
                        renderStart();
                        break;
                    case 'selectWorld':
                        renderWorldSelect();
                        break;
                    case 'playing':
                        renderPlaying();
                        break;
                    case 'result':
                        renderResult();
                        break;
                    case 'daily':
                        renderDaily();
                        break;
                    case 'review':
                        renderReview();
                        break;
                }
            }

            function renderStart() {
                const streak = getStreak();
                container.innerHTML = `
                <div class="dino">🐉</div><h1>PET 全能冒险岛</h1>
                <p style="font-size:1rem;">📚词汇3000+ | 📐语法1500 | 🗣️口语500</p>
                <p style="color:#8e44ad;font-weight:bold;">B1 Preliminary · 剑桥PET备考</p>
                <button class="btn start-btn" onclick="game.startDaily()">📅 每日打卡</button>
                <button class="btn start-btn" style="background:#8e44ad;box-shadow:0 5px 0 #6c3483;" onclick="game.startGame()">自由闯关 🚀</button>
                <p style="margin-top:15px;">🔥 连续打卡 ${streak} 天</p>
            `;
            }

            function renderDaily() {
                const target = getDailyTarget();
                const progress = getDailyProgress();
                const streak = getStreak();
                if (!target) {
                    container.innerHTML =
                        `<h2>📅 设定每日打卡目标</h2><p>目标 = 词汇 + 语法 + 口语，按比例分配</p><div class="goal-select">${[10,15,20,30,40,50,100].map(n=>`<button class="goal-btn" onclick="game.setDailyGoal(${n})">${n} 题</button>`).join('')}</div><button class="btn" onclick="game.goToStart()">返回</button>`;
                    return;
                }
                const done = progress >= target;
                const alloc = getDailyAllocation(target);
                container.innerHTML =
                    `<h2>📅 今日打卡</h2><p>目标：${target} 题（词汇${alloc.vocabCount}+语法${alloc.grammarCount}+口语${alloc.speakingCount}）</p><div class="daily-progress">✅ ${progress} / ${target}</div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,(progress/target)*100)}%;"></div></div><p>🔥 已连续打卡 ${streak} 天</p>${done?`<p style="color:green;font-size:1.5rem;">🎉 今日目标已完成！</p>`:`<button class="btn" onclick="game.startDailyPractice()">开始今日打卡</button>`}<button class="btn" onclick="game.goToStart()" style="background:#95a5a6;">返回首页</button><button class="btn" onclick="game.resetDaily()" style="background:#e74c3c;box-shadow:0 5px 0 #c0392b;">重新设定目标</button>`;
            }

            function renderWorldSelect() {
                const s = state.collectedStars;
                container.innerHTML =
                    `<h2>选择关卡</h2><div class="world-card" onclick="game.selectWorld('vocab')"><div class="world-icon">🌳</div><div>词汇森林</div><div class="stars">${'⭐'.repeat(s.vocab||0)}</div></div><div class="world-card" onclick="game.selectWorld('grammar')"><div class="world-icon">⛰️</div><div>语法山</div><div class="stars">${'⭐'.repeat(s.grammar||0)}</div></div><div class="world-card" onclick="game.selectWorld('speaking')"><div class="world-icon">🏘️</div><div>口语村</div><div class="stars">${'⭐'.repeat(s.speaking||0)}</div></div><br><button class="btn" onclick="game.goToStart()" style="background:#95a5a6;">返回首页</button><p>生命：${'❤️'.repeat(state.lives)}</p>`;
            }

            function renderPlaying() {
                const q = state.questions[state.currentIndex];
                if (!q) return;
                const progress = (state.currentIndex / state.questions.length) * 100;
                let html = '';
                const modeLabel = state.isReviewMode ? '🔄错题重做' : (state.dailyMode ? '📅每日打卡' : ({ vocab: '🌳词汇',
                    grammar: '⛰️语法', speaking: '🏘️口语' })[state.currentWorld]);
                if (q.type === 'vocab') html = `<div class="question-text">"${q.english}" 的中文意思是？</div>`;
                else if (q.type === 'grammar') html =
                    `<div class="question-text">${q.question || '（题目缺失）'}</div>`;
                else html =
                    `<div class="question-text">${q.scenario}</div><button class="btn" id="btnReadScenario" style="font-size:1rem;padding:8px 20px;">🔊 听发音</button>`;
                const opts = q.options.map((opt, i) =>
                    `<button class="option-btn" data-action="answer" data-idx="${i}">${opt}</button>`).join('');
                const feedbackClass = state.feedback && state.feedback.includes('❌') ? 'feedback-msg explain' :
                    'feedback-msg';
                let headerHTML = '';
                if (state.dailyMode) {
                    const dc = state.dailyCorrect,
                        dt = state.dailyTotal;
                    headerHTML =
                        `<div class="header"><span>📅 每日打卡</span><span class="score">⭐ ${state.stars}</span></div>
                    <div style="font-size:0.9rem;margin:8px 0;color:#2c3e50;">
                        🌳词汇 ${dc.vocab||0}/${dt.vocab||0} &nbsp;|&nbsp; ⛰️语法 ${dc.grammar||0}/${dt.grammar||0} &nbsp;|&nbsp; 🏘️口语 ${dc.speaking||0}/${dt.speaking||0}
                    </div>`;
                } else {
                    headerHTML =
                        `<div class="header"><span class="lives">${'❤️'.repeat(Math.max(0,state.lives))}</span><span>${modeLabel}</span><span class="score">⭐ ${state.stars}</span></div>`;
                }
                container.innerHTML =
                    `${headerHTML}<div class="progress-bar"><div class="progress-fill" style="width:${progress}%;"></div></div><div class="timer">⏳ ${state.timeLeft}</div><div class="question-area">${html}</div><div class="options">${opts}</div><div class="${feedbackClass}">${state.feedback||''}</div>`;
            }

            function renderReview() {
                const wq = state.wrongQuestions;
                if (!wq.length) { renderResult(); return; }
                let reviewHtml = wq.map((item, i) => {
                    const q = item.question;
                    const qText = getQuestionDisplay(q);
                    const correctAns = q.options[q.correct];
                    const wrongAns = item.wrongAnswer;
                    const explain = getExplanation(q, -1);
                    return `<div class="review-item"><div class="review-q">${i+1}. ${qText}</div><div class="review-wrong">❌ 你选的：${wrongAns}</div><div class="review-correct">✅ 正确答案：${correctAns}</div><div class="review-explain">${q.explanation || explain}</div></div>`;
                }).join('');
                container.innerHTML =
                    `<h2>📋 错题回顾 <span class="review-label">${wq.length} 题</span></h2><div class="review-scroll">${reviewHtml}</div><button class="btn start-btn" onclick="game.startReviewRedo()">🔄 重做错题</button><button class="btn" onclick="game.skipReview()">跳过</button>`;
            }

            function renderResult() {
                const t = state.totalStars;
                let cert = t >= 8 ? '<div class="certificate">🎉 金钥匙！PET大师！</div>' : (t >= 5 ?
                    '<div class="certificate">👍 不错！继续加油！</div>' : '');
                container.innerHTML =
                    `<div class="dino">🐉🎉</div><h2>冒险完成！</h2><p>总分：${state.score}</p><p>总星星：${'⭐'.repeat(t)} (${t}/9)</p>${cert}<button class="btn" onclick="game.restart()">再玩一次</button><button class="btn" onclick="game.goToStart()">返回首页</button>`;
            }

            container.addEventListener('click', function(e) {
                const btn = e.target.closest('[data-action]');
                if (!btn) return;
                const action = btn.getAttribute('data-action');
                if (action === 'answer') {
                    const idx = parseInt(btn.getAttribute('data-idx'));
                    answer(idx);
                }
            });

            document.addEventListener('click', function(e) {
                if (e.target.id === 'btnReadScenario' || e.target.closest('#btnReadScenario')) {
                    const q = state.questions[state.currentIndex];
                    if (q && q.type === 'speaking') {
                        speakNow(q.options[q.correct]);
                    }
                }
            }, true);

            function startGame() {
                state.lives = TOTAL_LIVES;
                state.score = 0;
                state.stars = 0;
                state.collectedStars = { vocab: 0, grammar: 0, speaking: 0 };
                state.totalStars = 0;
                state.dailyMode = false;
                state.isReviewMode = false;
                state.wrongQuestions = [];
                state.dailyCorrect = { vocab: 0, grammar: 0, speaking: 0 };
                state.dailyTotal = { vocab: 0, grammar: 0, speaking: 0 };
                state.screen = 'selectWorld';
                render();
            }

            function startDaily() { state.screen = 'daily';
                render(); }

            function setDailyGoal(n) { setDailyTarget(n);
                setDailyProgress(0);
                render(); }

            function resetDaily() { localStorage.removeItem(STORAGE_KEY_TARGET);
                localStorage.removeItem(STORAGE_KEY_PROGRESS);
                render(); }

            function startDailyPractice() {
                const target = getDailyTarget();
                if (!target) return;
                const alloc = getDailyAllocation(target);
                state.dailyMode = true;
                state.isReviewMode = false;
                state.currentWorld = 'daily';
                state.currentIndex = 0;
                state.currentCorrectCount = 0;
                state.canAnswer = true;
                state.feedback = '';
                state.wrongQuestions = [];
                state.dailyCorrect = { vocab: 0, grammar: 0, speaking: 0 };
                state.dailyTotal = { vocab: 0, grammar: 0, speaking: 0 };
                const vocabWords = getDueVocabWords(alloc.vocabCount);
                const vocabQuestions = vocabWords.map(word => {
                    const correctCN = WORD_MEANING[word] || '(' + word + ')';
                    const distractors = [];
                    const others = Object.keys(WORD_MEANING).filter(w => w !== word);
                    while (distractors.length < 3) {
                        const r = others[Math.floor(Math.random() * others.length)];
                        const m = WORD_MEANING[r];
                        if (m && !distractors.includes(m) && m !== correctCN) distractors.push(m);
                    }
                    const options = shuffleArray([correctCN, ...distractors]);
                    return { type: 'vocab', english: word, options, correct: options.indexOf(correctCN) };
                });
                const grammarQuestions = generateGrammarQuestions(alloc.grammarCount).map(q => ({ ...q, type: 'grammar' }));
                const speakingQuestions = generateSpeakingQuestions(alloc.speakingCount).map(q => ({ ...q,
                    type: 'speaking' }));
                state.questions = shuffleArray([...vocabQuestions, ...grammarQuestions, ...speakingQuestions]);
                state.dailyTotal = { vocab: vocabQuestions.length, grammar: grammarQuestions.length, speaking: speakingQuestions
                        .length };
                state.screen = 'playing';
                startTimer();
                render();
            }

            function selectWorld(world) {
                state.dailyMode = false;
                state.isReviewMode = false;
                state.currentWorld = world;
                state.currentIndex = 0;
                state.currentCorrectCount = 0;
                state.canAnswer = true;
                state.feedback = '';
                state.wrongQuestions = [];
                if (world === 'vocab') state.questions = generateVocabQuestions(QUESTIONS_PER_ROUND);
                else if (world === 'grammar') state.questions = generateGrammarQuestions(QUESTIONS_PER_ROUND);
                else state.questions = generateSpeakingQuestions(QUESTIONS_PER_ROUND);
                state.screen = 'playing';
                startTimer();
                render();
            }

            function startTimer() {
                clearInterval(state.timerInterval);
                state.timeLeft = QUESTION_TIME;
                state.timerInterval = setInterval(() => {
                    state.timeLeft--;
                    const el = document.querySelector('.timer');
                    if (el) el.textContent = `⏳ ${state.timeLeft}`;
                    if (state.timeLeft <= 0) { clearInterval(state.timerInterval); if (state.canAnswer)
                    handleTimeout(); }
                }, 1000);
            }

            function answer(idx) {
                if (!state.canAnswer) return;
                state.canAnswer = false;
                clearInterval(state.timerInterval);
                const q = state.questions[state.currentIndex];
                const correct = idx === q.correct;
                document.querySelectorAll('.option-btn').forEach((b, i) => {
                    b.disabled = true;
                    if (i === q.correct) b.classList.add('correct');
                    else if (i === idx && !correct) b.classList.add('wrong');
                });
                if (correct) {
                    state.score += 10;
                    state.stars++;
                    state.currentCorrectCount++;
                    if (state.dailyMode && q.type) { state.dailyCorrect[q.type] = (state.dailyCorrect[q.type] || 0) + 1; }
                    state.feedback = '✅ 正确！ +10分';
                    playSound('correct');
                    if (q.type === 'vocab') speakNow(q.english);
                    else speakNow(q.options[q.correct]);
                    if (q.type === 'vocab' && state.dailyMode) { recordVocabAnswer(q.english, true); }
                    setTimeout(() => {
                        if (!state.dailyMode && state.lives <= 0) { gameOver(); return; }
                        nextQuestion();
                    }, 1500);
                } else {
                    if (state.isReviewMode) {
                        state.wrongQuestions.push({ question: { ...q }, wrongAnswer: q.options[idx], wrongIdx: idx });
                        state.feedback = `❌ 再想想，做对了再继续哦！\n${getExplanation(q, idx)}`;
                        playSound('wrong');
                        speakNow(q.options[q.correct]);
                        updateFeedback();
                        const newOpts = shuffleArray(q.options);
                        const newCorrect = newOpts.indexOf(q.options[q.correct]);
                        state.questions[state.currentIndex].options = newOpts;
                        state.questions[state.currentIndex].correct = newCorrect;
                        state.canAnswer = true;
                        render();
                        return;
                    }
                    if (!state.dailyMode) state.lives--;
                    state.wrongQuestions.push({ question: { ...q }, wrongAnswer: q.options[idx], wrongIdx: idx });
                    if (q.type && state.dailyMode) state.dailyTotal[q.type] = (state.dailyTotal[q.type] || 0);
                    if (q.type === 'vocab' && state.dailyMode) recordVocabAnswer(q.english, false);
                    state.feedback = `❌ 错误！\n${getExplanation(q, idx)}`;
                    playSound('wrong');
                    speakNow(q.options[q.correct]);
                    updateFeedback();
                    showNextButton();
                }
            }

            function handleTimeout() {
                state.canAnswer = false;
                const q = state.questions[state.currentIndex];
                if (state.isReviewMode) {
                    state.wrongQuestions.push({ question: { ...q }, wrongAnswer: '（未作答）', wrongIdx: -1 });
                    state.feedback = `❌ 再想想，做对了再继续哦！\n${getExplanation(q)}`;
                    playSound('wrong');
                    speakNow(q.options[q.correct]);
                    updateFeedback();
                    const newOpts = shuffleArray(q.options);
                    const newCorrect = newOpts.indexOf(q.options[q.correct]);
                    state.questions[state.currentIndex].options = newOpts;
                    state.questions[state.currentIndex].correct = newCorrect;
                    state.canAnswer = true;
                    render();
                    return;
                }
                if (!state.dailyMode) state.lives--;
                state.wrongQuestions.push({ question: { ...q }, wrongAnswer: '（未作答）', wrongIdx: -1 });
                if (q.type === 'vocab' && state.dailyMode) recordVocabAnswer(q.english, false);
                state.feedback = `⏰ 时间到！\n${getExplanation(q)}`;
                playSound('wrong');
                const btn = document.querySelector(`[data-idx="${q.correct}"]`);
                if (btn) btn.classList.add('correct');
                speakNow(q.options[q.correct]);
                updateFeedback();
                showNextButton();
            }

            function updateFeedback() {
                const feedbackDiv = document.querySelector('.feedback-msg') || document.querySelector('.explain');
                if (feedbackDiv && state.feedback) {
                    const isWrong = state.feedback.includes('❌');
                    feedbackDiv.className = isWrong ? 'feedback-msg explain' : 'feedback-msg';
                    feedbackDiv.innerHTML = state.feedback.replace(/\n/g, '<br>');
                }
            }

            function showNextButton() {
                if (!state.isReviewMode && state.lives <= 0) { gameOver(); return; }
                if (state.currentIndex >= state.questions.length - 1) { nextQuestion(); return; }
                const feedbackDiv = document.querySelector('.feedback-msg') || document.querySelector('.explain');
                if (feedbackDiv) {
                    feedbackDiv.innerHTML +=
                        `<br><br><button class="btn" onclick="game.nextQuestion()" style="margin-top:10px;">下一题 ▶</button>`;
                }
            }

            function nextQuestion() {
                state.currentIndex++;
                if (state.currentIndex >= state.questions.length) {
                    if (state.dailyMode && !state.isReviewMode) finishDaily();
                    else if (state.isReviewMode) finishReviewRedo();
                    else finishWorld();
                } else { state.canAnswer = true;
                    state.feedback = '';
                    startTimer();
                    render(); }
            }

            function finishWorld() {
                clearInterval(state.timerInterval);
                const total = state.questions.length,
                    correct = state.currentCorrectCount;
                let stars = 0;
                if (correct === total) stars = 3;
                else if (correct >= total * 0.8) stars = 2;
                else if (correct >= total * 0.5) stars = 1;
                state.collectedStars[state.currentWorld] = stars;
                state.totalStars = Object.values(state.collectedStars).reduce((a, b) => a + b, 0);
                if (state.wrongQuestions.length > 0) { state.screen = 'review';
                    render(); } else { state.currentCorrectCount = 0;
                    container.innerHTML =
                        `<h2>${({vocab:'🌳词汇森林',grammar:'⛰️语法山',speaking:'🏘️口语村'})[state.currentWorld]} 完成！</h2><div style="font-size:2rem;">${'⭐'.repeat(stars)}</div><p>全部正确！🎉 获得 ${stars} 颗星</p><button class="btn" onclick="game.continueAdventure()">继续冒险</button>`; }
            }

            function finishDaily() {
                clearInterval(state.timerInterval);
                if (state.wrongQuestions.length > 0) { state.screen = 'review';
                    render(); return; }
                completeDaily();
            }

            function completeDaily() {
                const target = getDailyTarget();
                setDailyProgress(target);
                const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
                const progressData = JSON.parse(localStorage.getItem(STORAGE_KEY_PROGRESS) || '{}');
                const hasYesterday = progressData[yesterday] !== undefined;
                let streak = getStreak();
                if (!progressData[getTodayStr()]) {
                    if (hasYesterday) streak += 1;
                    else if (!hasYesterday && streak === 0) streak = 1;
                    else if (!hasYesterday) streak = 1;
                }
                setStreak(streak);
                state.dailyMode = false;
                state.isReviewMode = false;
                const dc = state.dailyCorrect,
                    dt = state.dailyTotal;
                container.innerHTML = `<h2>📅 今日打卡完成！</h2>
                <p>🌳 词汇：${dc.vocab||0}/${dt.vocab||0} ✅</p>
                <p>⛰️ 语法：${dc.grammar||0}/${dt.grammar||0} ✅</p>
                <p>🏘️ 口语：${dc.speaking||0}/${dt.speaking||0} ✅</p>
                <p>🔥 连续打卡 ${streak} 天</p>
                <button class="btn" onclick="game.goToStart()">返回首页</button>
                <button class="btn" onclick="game.startDaily()">继续打卡</button>`;
            }

            function startReviewRedo() {
                if (!state.wrongQuestions.length) return;
                const redoQuestions = state.wrongQuestions.map(item => {
                    const origQ = item.question;
                    const newOpts = shuffleArray(origQ.options);
                    const newCorrect = newOpts.indexOf(origQ.options[origQ.correct]);
                    return { ...origQ, options: newOpts, correct: newCorrect };
                });
                state.questions = redoQuestions;
                state.currentIndex = 0;
                state.currentCorrectCount = 0;
                state.canAnswer = true;
                state.feedback = '';
                state.wrongQuestions = [];
                state.isReviewMode = true;
                state.lives = TOTAL_LIVES;
                state.screen = 'playing';
                startTimer();
                render();
            }

            function finishReviewRedo() {
                clearInterval(state.timerInterval);
                if (state.wrongQuestions.length > 0) { state.screen = 'review';
                    render(); } else {
                    if (state.dailyMode) completeDaily();
                    else { state.isReviewMode = false;
                        container.innerHTML =
                            `<h2>🎉 错题全部做对！</h2><p>太棒了，继续加油！</p><button class="btn" onclick="game.continueAdventure()">继续冒险</button>`; }
                }
            }

            function skipReview() {
                state.wrongQuestions = [];
                state.isReviewMode = false;
                if (state.dailyMode) completeDaily();
                else {
                    const total = state.questions.length;
                    const correct = total;
                    let stars = 0;
                    if (correct === total) stars = 3;
                    else if (correct >= total * 0.8) stars = 2;
                    else if (correct >= total * 0.5) stars = 1;
                    state.collectedStars[state.currentWorld] = stars;
                    state.totalStars = Object.values(state.collectedStars).reduce((a, b) => a + b, 0);
                    state.currentCorrectCount = 0;
                    container.innerHTML =
                        `<h2>${({vocab:'🌳词汇森林',grammar:'⛰️语法山',speaking:'🏘️口语村'})[state.currentWorld]} 完成！</h2><div style="font-size:2rem;">${'⭐'.repeat(stars)}</div><p>正确 ${correct}/${total} 题，获得 ${stars} 颗星</p><button class="btn" onclick="game.continueAdventure()">继续冒险</button>`;
                }
            }

            function continueAdventure() {
                if (state.lives <= 0) { gameOver(); return; }
                const played = Object.values(state.collectedStars).filter(v => v !== undefined).length;
                if (played >= 3) { state.totalStars = Object.values(state.collectedStars).reduce((a, b) => a + b, 0);
                    state.screen = 'result';
                    render(); } else { state.screen = 'selectWorld';
                    render(); }
            }

            function gameOver() {
                clearInterval(state.timerInterval);
                if (state.wrongQuestions.length > 0) { state.screen = 'review';
                    render(); return; }
                state.totalStars = Object.values(state.collectedStars).reduce((a, b) => a + b, 0);
                container.innerHTML =
                    `<div class="dino">😢</div><h2>生命耗尽</h2><p>总分：${state.score}</p><p>总星星：${'⭐'.repeat(state.totalStars)}</p><button class="btn" onclick="game.restart()">重新挑战</button>`;
            }

            function goToStart() { clearInterval(state.timerInterval);
                state.screen = 'start';
                render(); }

            function restart() { clearInterval(state.timerInterval);
                startGame(); }

            window.game = { startGame, startDaily, setDailyGoal, resetDaily, startDailyPractice, selectWorld, answer,
                continueAdventure, goToStart, restart, toggleSound: function() { unlockAll();
                    playSound('correct');
                    render(); }, startReviewRedo, skipReview, nextQuestion };
            render();
        })();
    </script>
</body>
</html>
